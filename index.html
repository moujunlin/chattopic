<script>

  border: "#ccc",
  shadow: "#c7d2ea",

  goldLight: "#e0c068",
  goldDark: "#9a7520",
  open: "#7ab3e0",
  active: "#2b4280",
  closed: "#d4a03c"
};

  useRef,

async function api(path, opts = {}) {
  try {
    const url = SUPABASE_URL + '/functions/v1/chattopic/' + path;
    const r = await fetch(url, {
      headers: {
        'Content-Type': 'application/json',
        'apikey': API_KEY,
        'Authorization': 'Bearer ' + API_KEY
      },
      ...opts
    });
    const json = await r.json();
    // unwrap { data: ..., _context: ... }
    if (json && typeof json === 'object' && 'data' in json) {
      return json.data;
    }
    return json;
  } catch (e) {
    return null;
  }
}

function statusColor(status) {
  if (status === 'open') return CL.open;
  if (status === 'active') return CL.active;
  if (status === 'closed') return CL.gold;
  if (status === 'dark') return CL.faint;
  return CL.faint;
}

function PixelIcon({ size = 90 }) {
  const g = 14, px = size / g, dk = CL.dark, mn = CL.primary, wh = "#f5f5fa", rv = "#647db9", ps = [];
  const a = (gx, gy, w, h, c) => {
    for (let x = gx; x < gx + w; x++) for (let y = gy; y < gy + h; y++) ps.push({ x, y, c });
  };
  for (let i = 0; i < 14; i++) {
    a(i, 0, 1, 1, dk); a(i, 13, 1, 1, dk);
    a(0, i, 1, 1, dk); a(13, i, 1, 1, dk);
  }
  a(1, 1, 12, 12, mn);
  a(2, 2, 1, 1, rv); a(11, 2, 1, 1, rv);
  a(2, 11, 1, 1, rv); a(11, 11, 1, 1, rv);
  a(5, 2, 4, 2, wh); a(4, 3, 2, 2, wh); a(8, 3, 2, 2, wh);
  a(8, 5, 2, 1, wh); a(7, 6, 2, 1, wh); a(6, 7, 2, 2, wh); a(6, 10, 2, 2, wh);
  return React.createElement('div', {
    style: { width: size, height: size, position: 'relative' }
  }, ps.map((p, i) => React.createElement('div', {
    key: i,
    style: { position: 'absolute', left: p.x * px, top: p.y * px, width: px, height: px, backgroundColor: p.c }
  })));
}

function TopBar({ left, center, right, onLeft, onRight }) {
  return React.createElement('div', {
    style: {
      width: '100%', maxWidth: 440, display: 'flex', justifyContent: 'space-between',

    React.createElement('div', {
      onClick: onLeft,
      style: { fontSize: 10, letterSpacing: 2, color: CL.muted, textTransform: 'uppercase', cursor: onLeft ? 'pointer' : 'default' }

    React.createElement('div', {
      style: { fontSize: 10, letterSpacing: 2, color: CL.primary, textTransform: 'uppercase' }
    }, center),
    React.createElement('div', {
      onClick: onRight,
      style: { fontSize: 10, letterSpacing: 2, color: CL.muted, textTransform: 'uppercase', cursor: onRight ? 'pointer' : 'default' }

  );
}

function Btn({ children, dk, onClick, style = {} }) {
  const [h, setH] = useState(false);

      transition: 'all .15s',
      ...style
    }

}

function PixelStar({ filled, size = 16 }) {
  const px = size / 7;
  const pts = [[3,0],[2,1],[3,1],[4,1],[0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[1,5],[2,5],[3,5],[4,5],[5,5],[0,6],[1,6],[5,6],[6,6]];
  const bc = filled ? CL.gold : CL.faint;
  return React.createElement('div', {
    style: { width: size, height: size, position: 'relative', display: 'inline-block' }
  }, pts.map(([x, y], i) => React.createElement('div', {
    key: i,
    style: { position: 'absolute', left: x * px, top: y * px, width: Math.ceil(px), height: Math.ceil(px), background: bc, boxSizing: 'border-box' }
  })));
}

function PixelNode({ x, y, size: s, status, isSel, label, onDown }) {
  if (status === 'dark') return React.createElement('g', {
    onPointerDown: onDown, style: { cursor: 'pointer' }
  },
    React.createElement('rect', { x: x - s/2, y: y - s/2, width: s, height: s, fill: 'none', stroke: CL.faint, strokeWidth: 1.5, strokeDasharray: '3,2' }),
    label && React.createElement('text', { x, y: y + s/2 + 10, textAnchor: 'middle', fontSize: 7, fill: CL.faint, style: { fontFamily: "'DotGothic16',monospace" } }, label)
  );

  // open: light blue dashed; active: blue solid; closed: gold solid
  let base, bc, strokeDash;
  if (status === 'open') {
    base = [122, 179, 224]; bc = CL.open; strokeDash = '3,2';
  } else if (status === 'closed') {
    base = [212, 160, 60]; bc = CL.gold; strokeDash = null;
  } else {
    // active or default
    base = [43, 66, 128]; bc = CL.active; strokeDash = null;
  }

  const ts = Math.max(2, Math.floor(s / 4)), cnt = Math.ceil(s / ts), els = [];
  // For open status, no fill (dashed border only)
  if (status !== 'open') {
    for (let tx = 0; tx < cnt; tx++) for (let ty = 0; ty < cnt; ty++) {
      const dr = (Math.random() - .5) * 18 | 0, dg = (Math.random() - .5) * 16 | 0, db = (Math.random() - .5) * 14 | 0;
      els.push(React.createElement('rect', {
        key: tx + '-' + ty,
        x: x + tx * ts - s/2, y: y + ty * ts - s/2, width: ts, height: ts,
        fill: 'rgb(' + Math.max(0,Math.min(255,base[0]+dr)) + ',' + Math.max(0,Math.min(255,base[1]+dg)) + ',' + Math.max(0,Math.min(255,base[2]+db)) + ')'
      }));
    }
  }
  els.push(React.createElement('rect', {
    key: 'b', x: x - s/2, y: y - s/2, width: s, height: s, fill: status === 'open' ? 'none' : 'inherit',
    stroke: isSel ? CL.dark : bc, strokeWidth: isSel ? 2.5 : 1.5,
    strokeDasharray: strokeDash || undefined, opacity: isSel ? 1 : 0.85
  }));
  if (label) els.push(React.createElement('text', {
    key: 'l', x, y: y + s/2 + 10, textAnchor: 'middle', fontSize: 7,
    fill: isSel ? CL.dark : bc, style: { fontFamily: "'DotGothic16',monospace" }
  }, label));
  return React.createElement('g', { onPointerDown: onDown, style: { cursor: 'pointer' } }, els);
}

function useSpringFlip() {
  const [rot, setRot] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const aRef = useRef(null), vRef = useRef(0);
  const flip = useCallback(() => {
    const nt = flipped ? 0 : 180;
    setFlipped(!flipped);
    const st = .08, dm = .72;
    let v = vRef.current, p = rot;
    const an = () => {
      v = (v + -st * (p - nt)) * dm;
      p += v;
      if (Math.abs(v) < .05 && Math.abs(p - nt) < .1) {
        setRot(nt); vRef.current = 0; return;
      }
      setRot(p); vRef.current = v;
      aRef.current = requestAnimationFrame(an);
    };
    if (aRef.current) cancelAnimationFrame(aRef.current);
    aRef.current = requestAnimationFrame(an);
  }, [flipped, rot]);
  return { rot, flipped, flip };
}

// Render refs array as links/references
function RefsList({ refs }) {
  if (!refs || !refs.length) return null;
  return React.createElement('div', { style: { marginTop: 12 } },
    React.createElement('div', {
      style: { fontSize: 9, letterSpacing: 2, color: CL.pale, textTransform: 'uppercase', marginBottom: 6 }
    }, 'REFS'),
    refs.map((r, i) => {
      let label = '', href = null;
      if (r.type === 'url') { label = r.url || ''; href = r.url; }
      else if (r.type === 'notebook') { label = 'Notebook #' + r.id; }
      else if (r.type === 'ember') { label = 'Ember ' + r.id; }
      else if (r.type === 'corridor') { label = '走廊 #' + r.id; }
      else { label = r.id || r.url || JSON.stringify(r); }
      return React.createElement('div', { key: i, style: { marginBottom: 6 } },
        href
          ? React.createElement('a', { href, target: '_blank', rel: 'noopener', onClick: e => e.stopPropagation(), style: { fontSize: 10, color: CL.light, textDecoration: 'underline', lineHeight: '1.4' } }, label)
          : React.createElement('span', { style: { fontSize: 10, color: CL.light, lineHeight: '1.4' } }, label)
      );
    })
  );
}

// Turns display (conversation thread)
function TurnsList({ turns }) {
  if (!turns || !turns.length) return React.createElement('div', {
    style: { fontSize: 11, color: CL.muted, textAlign: 'center', padding: '20px 0' }
  }, '还没有回应——第一个说点什么？');
  return React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } },
    turns.map((t, i) => {
      const isMao = t.by === 'maomao';
      return React.createElement('div', { key: i, style: { display: 'flex', flexDirection: 'column', alignItems: isMao ? 'flex-end' : 'flex-start' } },
        React.createElement('div', {
          style: {
            maxWidth: '85%', padding: '8px 12px',
            border: '2px solid ' + (isMao ? CL.primary : CL.pale),
            background: isMao ? CL.wash : CL.card,
            fontSize: 12, color: CL.dark, lineHeight: '1.6', whiteSpace: 'pre-wrap'
          }
        }, t.text),
        React.createElement('div', {
          style: { fontSize: 8, color: CL.muted, letterSpacing: 1, marginTop: 3 }
        }, (isMao ? '猫猫' : 'Lori') + ' · ' + (t.at ? t.at.slice(0,10) : ''))
      );
    })
  );
}

function TopicPage({ goTo }) {
  const { rot, flipped, flip } = useSpringFlip();
  const [ld, setLd] = useState(false);
  const [card, setCard] = useState(null);
  const [loading, setLoading] = useState(false);
  const [tab, setTab] = useState('topic'); // 'topic' | 'mine'
  const [newTopic, setNewTopic] = useState('');
  const [newWhy, setNewWhy] = useState('');
  const [showCreate, setShowCreate] = useState(false);
  const [newTurn, setNewTurn] = useState('');
  const [submitting, setSubmitting] = useState(false);

  useEffect(() => {
    setTimeout(() => setLd(true), 100);
    pickCard();
  }, []);

  const pickCard = async () => {
    setLoading(true);
    const c = await api('cards?pick=true&by=maomao');
    setCard(c && !c.error ? c : null);
    setLoading(false);
  };

  const createCard = async () => {
    if (!newTopic.trim()) return;
    setSubmitting(true);
    const c = await api('cards', {
      method: 'POST',
      body: JSON.stringify({ created_by: 'maomao', title: newTopic.trim(), why: newWhy.trim(), body: '', _note: '猫猫创建新话题：' + newTopic.trim() })
    });
    if (c && !c.error) {
      setCard(c);
      setNewTopic('');
      setNewWhy('');
      setShowCreate(false);
    }
    setSubmitting(false);
  };

  const addTurn = async () => {
    if (!newTurn.trim() || !card) return;
    setSubmitting(true);
    const updated = await api('cards', {
      method: 'PATCH',
      body: JSON.stringify({ id: card.id, action: 'add_turn', turn: { by: 'maomao', text: newTurn.trim() }, _note: '猫猫在话题「' + card.title + '」下回应' })
    });
    if (updated && !updated.error) { setCard(updated); setNewTurn(''); }
    setSubmitting(false);
  };

  const sf = rot < 90;
  const an = d => ld ? `su .4s ease-out ${d}s both` : 'none';

  function FrontFace() {
    if (loading) return React.createElement('div', {
      style: { width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }
    }, React.createElement('div', { style: { fontSize: 11, color: CL.muted } }, '加载中...'));

    if (!card) return React.createElement('div', {
      style: { width: '100%', height: '100%', padding: '24px 20px', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }
    },
      React.createElement('div', { style: { fontSize: 9, letterSpacing: 2, color: CL.pale, textTransform: 'uppercase', marginBottom: 12 } }, 'OPEN TOPICS'),
      React.createElement('div', { style: { fontSize: 18, color: CL.dark, marginBottom: 8, textAlign: 'center' } }, '没有新话题'),
      React.createElement('div', { style: { fontSize: 11, color: CL.pale, marginBottom: 28, textAlign: 'center' } }, '尝试创建一个？'),
      React.createElement('div', { style: { width: '100%', maxWidth: 260, display: 'flex', flexDirection: 'column', gap: 10 } },
        React.createElement('button', {
          onClick: e => { e.stopPropagation(); setShowCreate(true); },
          style: { width: '100%', padding: 12, border: '2px solid ' + CL.primary, background: CL.card, color: CL.primary, fontFamily: "'DotGothic16',monospace", fontSize: 11, letterSpacing: 2, textTransform: 'uppercase', cursor: 'pointer', boxShadow: '2px 2px 0 ' + CL.shadow }
        }, '我想聊...')
      ),
      React.createElement('div', { style: { textAlign: 'center', marginTop: 28, fontSize: 9, letterSpacing: 2, color: CL.faint, textTransform: 'uppercase' } }, 'TAP TO FLIP')
    );

    return React.createElement('div', {
      style: { width: '100%', height: '100%', padding: '24px 20px', display: 'flex', flexDirection: 'column', overflow: 'auto' }
    },
      React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: 6 } },
        React.createElement('div', { style: { fontSize: 9, letterSpacing: 2, color: CL.pale, textTransform: 'uppercase' } }, card.category || ''),
        React.createElement('div', {
          style: {
            fontSize: 8, letterSpacing: 1, padding: '2px 7px',
            border: '1px solid ' + statusColor(card.status), color: statusColor(card.status), textTransform: 'uppercase'
          }
        }, card.status || 'open')
      ),
      React.createElement('div', { style: { fontSize: 9, letterSpacing: 1, color: CL.pale, marginBottom: 4 } }, '发起方：' + (card.created_by === 'maomao' ? '猫猫' : 'Lori')),
      React.createElement('div', { style: { fontSize: 20, color: CL.dark, marginBottom: 8, lineHeight: '1.3' } }, card.title),
      card.why && React.createElement('div', { style: { fontSize: 12, color: CL.mid, marginBottom: 8, lineHeight: '1.6', fontStyle: 'italic' } }, card.why),
      React.createElement('div', { style: { borderTop: '2px dashed ' + CL.faint, marginBottom: 10 } }),
      card.body && React.createElement('div', { style: { fontSize: 12, color: CL.mid, lineHeight: '1.8', flex: 1, whiteSpace: 'pre-wrap' } }, card.body),
      React.createElement(RefsList, { refs: card.refs }),
      React.createElement('div', { style: { textAlign: 'center', marginTop: 14, fontSize: 9, letterSpacing: 2, color: CL.faint, textTransform: 'uppercase' } }, 'TAP TO FLIP')
    );
  }

  function BackFace() {
    return React.createElement('div', {
      style: { width: '100%', height: '100%', padding: '20px 16px', display: 'flex', flexDirection: 'column' }

    }, f.length + ' 话题'),
